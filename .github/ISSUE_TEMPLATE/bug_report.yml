name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: "1. Start the server\n2. Connect Claude Code\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS, Linux, Windows]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
